<footer class="site-footer">
  <div class="site-shell footer-inner">
    <nav class="footer-links" aria-label="{{ if eq .Site.Language.Lang "he" }}קישורים מקצועיים{{ else }}Professional links{{ end }}">
      {{ with .Site.Params.github }}<a href="{{ . }}" aria-label="Bar Jacobi on GitHub">GitHub</a>{{ end }}
      {{ with .Site.Params.scholar }}<a href="{{ . }}" aria-label="Bar Jacobi on Google Scholar">Google Scholar</a>{{ end }}
      {{ with .Site.Params.linkedin }}<a href="{{ . }}" aria-label="Bar Jacobi on LinkedIn">LinkedIn</a>{{ end }}
      {{ with .Site.Params.email }}<a href="mailto:{{ . }}" aria-label="Email Bar Jacobi">Email</a>{{ end }}
    </nav>
    <p>© {{ now.Year }} {{ .Site.Title }} · Built with <a href="https://gohugo.io/">Hugo</a></p>
  </div>
</footer>
