baseURL                          = "https://barjacobi.com/"
theme                            = "introduction"
DefaultContentLanguage           = "en"

[services]
    [services.googleAnalytics]
        ID = "G-X08FX5B5K1"

[params]
    themeStyle                   = "auto"
    customCSS                   = ["css/custom.css"]
    customJS                    = ["js/theme.js"]
    favicon                      = "/img/fav.ico"
    showIntro                    = true
    showMenu                     = true
    showRSSButton                = false
    fadeIn                       = true
    fadeInIndex                  = true
    dateFormat                   = "Jan 2, 2006"
    email                        = "baraveh@gmail.com"
    github                       = "https://github.com/barjacobi"
    linkedin                     = "https://www.linkedin.com/in/bar-jacobi/"
    scholar                      = "https://scholar.google.com/citations?user=Pjly-lwAAAAJ"
    orcid                        = "https://orcid.org/0009-0002-0638-399X"

    [params.home]
        introHeight              = "medium"
        showIntro                = true
        showLatest               = false 
        showAllPosts             = true
        allPostsArchiveFormat    = false
        numberOfProjectsToShow   = 3
        localTime                = false
        timeZone                 = "Asia/Jerusalem"
        timeFormat               = "en-US"

    [params.projects]
        useTwoColumns            = false

    [params.share]
        twitter                  = false
        facebook                 = false
        pinterest                = false

# ========== ENGLISH ==========

[languages.en]
    languageName     = "English"
    languageCode     = "en-us"
    contentDir       = "content/en"
    weight           = 0
    title            = "Bar Jacobi"

    [languages.en.params]
        description = "Bar Jacobi is a computational biology researcher and incoming Computer Science PhD student at the University of Washington, working on machine learning for biological sequence and structure."

        [[languages.en.params.blocks]]
            id = "intro"
            title = ""
            content = """{{< readfile file="content/en/home/intro.md" markdown="true" >}}"""

        [[languages.en.params.blocks]]
            id = "about"
            title = "About"
            content = """{{< readfile file="content/en/home/about.md" markdown="true" >}}"""

        [[languages.en.params.blocks]]
            id = "publications"
            title = "Publications"
            content = """{{< readfile file="content/en/home/publications.md" markdown="true" >}}"""

# ========== HEBREW ==========

[languages.he]
    languageName     = "עברית"
    languageCode     = "he"
    contentDir       = "content/he"
    weight           = 2
    title            = "בר יעקבי"
    customCSS = ["css/custom.css"]

    [languages.he.params]
        description = "בר יעקבי היא חוקרת בביולוגיה חישובית וסטודנטית נכנסת לדוקטורט במדעי המחשב באוניברסיטת וושינגטון, העוסקת בלמידת מכונה לרצפים ומבנים ביולוגיים."
        dateFormat   = "2 בינואר 2006"
        customCSS    = ["css/custom.css"]
        customJS     = ["js/theme.js"]

        [[languages.he.params.blocks]]
            id = "intro"
            title = ""
            content = """{{< readfile file="content/he/home/intro.md" markdown="true" >}}"""

        [[languages.he.params.blocks]]
            id = "about"
            title = "עליי"
            content = """{{< readfile file="content/he/home/about.md" markdown="true" >}}"""

        [[languages.he.params.blocks]]
            id = "publications"
            title = "פרסומים"
            content = """{{< readfile file="content/en/home/publications.md" markdown="true" >}}"""
      

[taxonomies]
    tag = "tags"
    series = "series"

[markup]
    defaultMarkdownHandler = "goldmark"

    [markup.goldmark]
    [markup.goldmark.renderer]
        unsafe = true

    [markup.highlight]
        codeFences = true
        guessSyntax = false
        hl_Lines = ""
        lineNoStart = 1
        lineNos = false
        lineNumbersInTable = true
        style = "solarized-dark"
        tabWidth = 4
